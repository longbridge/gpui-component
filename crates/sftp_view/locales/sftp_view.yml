    zh-CN: "正在建立 SFTP 连接..."
    zh-HK: "正在建立 SFTP 連接..."
  session_disconnected:
    en: SFTP session disconnected.
    zh-CN: SFTP 会话已断开连接。
    zh-HK: SFTP 會話已斷開連接。

# 终端
Terminal:
  open_here:
