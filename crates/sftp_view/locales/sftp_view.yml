    en: File Conflict
    zh-CN: 文件冲突
    zh-HK: 文件衝突
  confirm_delete:
    en: Confirm Delete
    zh-CN: 确认删除
    zh-HK: 確認刪除
  confirm_close:
    en: Confirm Close
    zh-CN: 确认关闭
    zh-HK: 確認關閉
  change_permission_title:
    en: "Change permission of %{name}"
    zh-CN: "修改 %{name} 的权限"
    zh-HK: "修改 %{name} 的權限"

# 冲突处理
Conflict:
  files_exist:
    en: "The following files already exist at destination:"
    zh-CN: "以下文件在目标位置已存在："
    zh-HK: "以下文件在目標位置已存在："
  choose_action:
    en: "Choose how to proceed:"
    zh-CN: "请选择处理方式："
    zh-HK: "請選擇處理方式："
  skip:
    en: Skip
    zh-CN: 跳过
    zh-HK: 跳過
  keep_both:
    en: Keep Both
    zh-CN: 保留两者
    zh-HK: 保留兩者
  merge:
    en: Merge
    zh-CN: 合并
    zh-HK: 合併
  overwrite:
    en: Overwrite
    zh-CN: 覆盖
    zh-HK: 覆蓋
  n_files:
    en: "%{name} and %{count} other files"
    zh-CN: "%{name} 等 %{count} 个文件"
    zh-HK: "%{name} 等 %{count} 個文件"

# 删除确认
Delete:
  confirm_folder:
    en: Are you sure you want to delete this folder and all its contents?
    zh-CN: 确定要删除这个文件夹及其所有内容吗？
    zh-HK: 確定要刪除這個文件夾及其所有內容嗎？
  confirm_folders:
    en: "Are you sure you want to delete these %{count} folders and all their contents?"
    zh-CN: "确定要删除这 %{count} 个文件夹及其所有内容吗？"
    zh-HK: "確定要刪除這 %{count} 個文件夾及其所有內容嗎？"
  confirm_file:
    en: Are you sure you want to delete this file?
    zh-CN: 确定要删除这个文件吗？
    zh-HK: 確定要刪除這個文件嗎？
  confirm_files:
    en: "Are you sure you want to delete these %{count} files?"
    zh-CN: "确定要删除这 %{count} 个文件吗？"
    zh-HK: "確定要刪除這 %{count} 個文件嗎？"
  confirm_mixed:
    en: "Are you sure you want to delete %{files} files and %{dirs} folders?"
    zh-CN: "确定要删除 %{files} 个文件和 %{dirs} 个文件夹吗？"
    zh-HK: "確定要刪除 %{files} 個文件和 %{dirs} 個文件夾嗎？"
  and_more:
    en: "... and %{count} more items"
    zh-CN: "... 还有 %{count} 项"
    zh-HK: "... 還有 %{count} 項"
  deleting:
    en: "Deleting: %{name}"
    zh-CN: "正在删除: %{name}"
    zh-HK: "正在刪除: %{name}"
  scanning:
    en: "Scanning..."
    zh-CN: "正在扫描..."
    zh-HK: "正在掃描..."
  delete_n_items:
    en: "Delete %{count} items"
    zh-CN: "删除 %{count} 项"
    zh-HK: "刪除 %{count} 項"

