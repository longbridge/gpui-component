_version: 2

Ssh:
  auth_password_failed:
    en: Password authentication failed
    zh-CN: 密码认证失败
    zh-HK: 密碼認證失敗
  auth_certificate_failed:
    en: Certificate authentication failed
    zh-CN: 证书认证失败
    zh-HK: 證書認證失敗
  auth_public_key_failed:
    en: Public key authentication failed
    zh-CN: 公钥认证失败
    zh-HK: 公鑰認證失敗
  auth_agent_connect_failed:
    en: SSH agent connection failed
    zh-CN: SSH Agent 连接失败
    zh-HK: SSH Agent 連線失敗
  auth_agent_no_identities:
    en: SSH agent has no available identities
    zh-CN: SSH Agent 中没有可用身份
    zh-HK: SSH Agent 中沒有可用身份
  auth_agent_failed:
    en: SSH agent authentication failed
    zh-CN: SSH Agent 认证失败
    zh-HK: SSH Agent 認證失敗
  auth_auto_publickey_failed:
    en: Automatic public key authentication failed
    zh-CN: 自动公钥认证失败
    zh-HK: 自動公鑰認證失敗
  auth_no_local_identity:
    en: No available local SSH identity was detected
    zh-CN: 未检测到可用的本地 SSH 身份
    zh-HK: 未檢測到可用的本地 SSH 身份
  auth_auto_publickey_next_step:
    en: Please load SSH Agent or switch to "Private Key" mode to specify a key file manually
    zh-CN: 请加载 SSH Agent，或切换为「私钥文件」模式手动指定私钥
    zh-HK: 請加載 SSH Agent，或切換為「私鑰文件」模式手動指定私鑰
  socks5_proxy_connect_failed:
    en: "SOCKS5 proxy connection failed: %{error}"
    zh-CN: "SOCKS5代理连接失败: %{error}"
    zh-HK: "SOCKS5代理連線失敗: %{error}"
  http_proxy_connect_failed:
    en: "Failed to connect HTTP proxy: %{error}"
    zh-CN: "连接HTTP代理失败: %{error}"
    zh-HK: "連線HTTP代理失敗: %{error}"
  http_proxy_connection_failed:
    en: "HTTP proxy connection failed: %{response}"
    zh-CN: "HTTP代理连接失败: %{response}"
    zh-HK: "HTTP代理連線失敗: %{response}"
