<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFE0"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FFE0"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    <radialGradient id="fillGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5CC" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0099FF" stop-opacity="0.02"/>
    </radialGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00CCAA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0099FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="xGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <g opacity="0.045" stroke="#00E5CC" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <circle cx="256" cy="256" r="180" fill="url(#glowBg)"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.12"/>

  <line x1="104" y1="256" x2="52" y2="256" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <circle cx="38" cy="256" r="13" fill="url(#accentGrad)" filter="url(#nodeGlow)"/>

  <line x1="408" y1="256" x2="460" y2="256" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <circle cx="474" cy="256" r="13" fill="url(#accentGrad)" filter="url(#nodeGlow)"/>

  <line x1="138" y1="138" x2="96" y2="96" stroke="url(#accentGrad2)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <circle cx="85" cy="85" r="11" fill="url(#accentGrad2)" filter="url(#nodeGlow)" opacity="0.85"/>

  <line x1="374" y1="138" x2="416" y2="96" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <circle cx="427" cy="85" r="11" fill="url(#accentGrad)" filter="url(#nodeGlow)" opacity="0.85"/>

  <line x1="256" y1="408" x2="256" y2="460" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <circle cx="256" cy="474" r="13" fill="url(#accentGrad)" filter="url(#nodeGlow)"/>

  <circle cx="256" cy="256" r="152" fill="url(#fillGrad)"/>
  <circle cx="256" cy="256" r="152" fill="none" stroke="url(#accentGrad)" stroke-width="28" opacity="0.12" filter="url(#xGlow)"/>
  <circle cx="256" cy="256" r="152" fill="none" stroke="url(#accentGrad)" stroke-width="20" filter="url(#bigGlow)"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.2"/>
  <circle cx="256" cy="256" r="32" fill="url(#accentGrad)" filter="url(#dotGlow)"/>
  <circle cx="245" cy="245" r="11" fill="white" opacity="0.45"/>
</svg>
